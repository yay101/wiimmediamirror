<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WiiM Media Mirror</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <!-- Top bar -->
    <header id="topbar" class="fade-target">
      <div id="device-selector" class="dropdown">
        <button id="device-btn" class="icon-btn" title="Select Device">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="3" width="20" height="14" rx="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
        </button>
        <div id="device-list" class="dropdown-content">
          <div class="dropdown-header">Devices</div>
          <div id="device-items"></div>
        </div>
      </div>
      <div id="device-name">No Device</div>
      <button id="discover-btn" class="icon-btn" title="Discover Devices">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
        </svg>
      </button>
    </header>

    <!-- Album art -->
    <main id="artwork">
      <div id="art-container">
        <img id="art-img" src="" alt="Album Art">
        <div id="art-placeholder">
          <svg viewBox="0 0 24 24" width="80" height="80" fill="none" stroke="currentColor" stroke-width="1">
            <circle cx="12" cy="12" r="10"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <p>No Track Playing</p>
        </div>
      </div>
    </main>

    <!-- Track info -->
    <div id="track-info" class="fade-target">
      <div id="title" class="text-truncate">Not Playing</div>
      <div id="artist" class="text-truncate"></div>
      <div id="album" class="text-truncate"></div>
      <div id="quality-badge" class="badge" style="display:none"></div>
    </div>

    <!-- Media controls overlay -->
    <div id="controls" class="fade-target">
      <!-- Progress bar -->
      <div id="progress-container">
        <span id="rel-time">0:00</span>
        <div id="progress-bar">
          <div id="progress-fill"></div>
        </div>
        <span id="duration">0:00</span>
      </div>

      <!-- Transport controls -->
      <div id="transport">
        <button id="prev-btn" class="transport-btn" title="Previous">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
          </svg>
        </button>
        <button id="play-btn" class="transport-btn primary" title="Play">
          <svg id="play-icon" viewBox="0 0 24 24" width="40" height="40" fill="currentColor">
            <path d="M8 5v14l11-7z"/>
          </svg>
          <svg id="pause-icon" viewBox="0 0 24 24" width="40" height="40" fill="currentColor" style="display:none">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
          </svg>
        </button>
        <button id="next-btn" class="transport-btn" title="Next">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
          </svg>
        </button>
      </div>

      <!-- Volume + Source -->
      <div id="extras">
        <div id="volume-control">
          <button id="mute-btn" class="icon-btn" title="Mute">
            <svg id="vol-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
            </svg>
            <svg id="mute-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" style="display:none">
              <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
            </svg>
          </button>
          <input type="range" id="volume-slider" min="0" max="100" value="50">
          <span id="volume-val">50</span>
        </div>

        <div id="source-control" class="dropdown">
          <button id="source-btn" class="icon-btn" title="Switch Source">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
          </button>
          <div id="source-list" class="dropdown-content source-dropdown">
            <div class="dropdown-header">Input Source</div>
            <div class="source-item" data-mode="bluetooth">Bluetooth</div>
            <div class="source-item" data-mode="line-in">Line In</div>
            <div class="source-item" data-mode="optical">Optical</div>
            <div class="source-item" data-mode="optical2">Optical 2</div>
            <div class="source-item" data-mode="co-axial">Coaxial</div>
            <div class="source-item" data-mode="co-axial2">Coaxial 2</div>
            <div class="source-item" data-mode="phono">Phono</div>
            <div class="source-item" data-mode="HDMI">HDMI</div>
            <div class="source-item" data-mode="ARC">HDMI ARC</div>
            <div class="source-item" data-mode="external_usb">USB</div>
            <div class="source-item" data-mode="wifi">WiFi Streaming</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
